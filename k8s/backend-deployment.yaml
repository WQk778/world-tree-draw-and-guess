apiVersion: apps/v1
kind: Deployment
metadata:
  name: sjk-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sjk-backend
  template:
    metadata:
      labels:
        app: sjk-backend
    spec:
      containers:
      - name: sjk-backend
        image: your-registry/sjk-backend:latest
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: sjk-backend-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: sjk-backend-svc
spec:
  selector:
    app: sjk-backend
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP